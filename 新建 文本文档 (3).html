<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>赛博解忧信箱 | AI 小工具</title>
    <!-- 引入 Tailwind CSS，让页面瞬间变好看 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 赛博朋克的暗色调和呼吸感 */
        body {
            background-color: #0a0a0a;
            color: #e5e5e5;
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
        }
        .glass-panel {
            background: rgba(30, 30, 30, 0.6);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        /* 加载动画 */
        .loader {
            border: 3px solid rgba(255,255,255,0.1);
            border-top: 3px solid #3b82f6; 
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            display: inline-block;
            vertical-align: middle;
            margin-right: 8px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="glass-panel rounded-2xl w-full max-w-2xl p-6 md:p-8 shadow-2xl transition-all">
        
        <!-- 头部区域 -->
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold tracking-wider mb-2 text-blue-400">赛博解忧信箱</h1>
            <p class="text-sm text-gray-400">把你的心事或问题写下来，让 AI 给你一个冷静的拥抱。</p>
        </div>

        <!-- API Key 设置区（本地运行必备） -->
        <div class="mb-6 bg-gray-800/50 p-4 rounded-lg border border-gray-700">
            <label class="block text-xs text-gray-400 mb-1">如果是本地运行，请填入你的 Google Gemini API Key</label>
            <input type="password" id="apiKeyInput" placeholder="在此处粘贴你的 API Key (AIzaSy...)" 
                   class="w-full bg-transparent border-b border-gray-600 focus:border-blue-400 outline-none text-sm py-1 text-gray-200 placeholder-gray-600 transition-colors">
            <p class="text-[10px] text-gray-500 mt-1">本地 VS Code 运行请务必填写；如果你在右侧预览区运行则可以留空。</p>
        </div>

        <!-- 输入区域 -->
        <div class="mb-6">
            <textarea id="userInput" rows="4" placeholder="ul，今天发生了什么？或者是想问点什么技术问题？"
                      class="w-full bg-gray-900/80 border border-gray-700 rounded-xl p-4 text-gray-200 outline-none focus:ring-2 focus:ring-blue-500/50 resize-none transition-all"></textarea>
        </div>

        <!-- 发送按钮 -->
        <button id="sendBtn" onclick="callAI()" 
                class="w-full bg-blue-600 hover:bg-blue-500 text-white font-medium py-3 px-4 rounded-xl transition-colors flex justify-center items-center">
            <span>发送给架构师AI</span>
        </button>

        <!-- 输出区域 (一开始隐藏) -->
        <div id="outputArea" class="mt-8 hidden">
            <h3 class="text-sm text-gray-400 mb-2 border-b border-gray-700 pb-1">AI 的回信：</h3>
            <div id="aiResponse" class="text-gray-300 leading-relaxed text-sm whitespace-pre-wrap bg-gray-900/50 p-4 rounded-xl border border-gray-800 min-h-[100px]">
                <!-- AI 的回复会显示在这里 -->
            </div>
        </div>

    </div>

    <!-- 核心逻辑：JavaScript -->
    <script>
        // 企业级 API 请求重试机制（指数退避算法）
        async function fetchWithRetry(url, options, maxRetries = 5) {
            const delays = [1000, 2000, 4000, 8000, 16000]; // 每次失败后等待的时间（毫秒）
            for (let i = 0; i < maxRetries; i++) {
                try {
                    const response = await fetch(url, options);
                    if (response.ok) return response; // 如果成功，直接返回
                    if (i === maxRetries - 1) return response; // 如果是最后一次尝试，返回让外层处理报错
                } catch (error) {
                    if (i === maxRetries - 1) throw error; // 网络彻底断开时抛出错误
                }
                // 等待一段时间后再试
                await new Promise(res => setTimeout(res, delays[i]));
            }
        }

        async function callAI() {
            // 在 Canvas 环境中，apiKey 必须留空，系统底层会自动注入
            const apiKey = ""; 
            const userKey = document.getElementById('apiKeyInput').value.trim();
            const finalApiKey = userKey || apiKey; // 本地运行优先使用填写的Key，否则使用环境注入的Key
            
            // 【核心修复】：迎接 2026 年的动态模型路由！
            // 既然已经是2026年，本地运行（用户填Key）我们直接升级调用稳定的 gemini-2.5-flash 模型！
            // 如果没有填Key（在Canvas里运行），继续使用高级内部预览版 gemini-2.5-flash-preview-09-2025
            const modelName = userKey ? "gemini-2.5-flash" : "gemini-2.5-flash-preview-09-2025";
            
            const userInput = document.getElementById('userInput').value.trim();
            const sendBtn = document.getElementById('sendBtn');
            const outputArea = document.getElementById('outputArea');
            const aiResponse = document.getElementById('aiResponse');

            // 基础的防呆验证 (不再使用 alert，直接在页面上提示)
            if (!userInput) {
                outputArea.classList.remove('hidden');
                aiResponse.innerHTML = '<span class="text-yellow-400">机甲提示：你还没写任何心事呢！</span>';
                return;
            }

            // 准备起飞：变成加载状态
            sendBtn.disabled = true;
            sendBtn.innerHTML = '<div class="loader"></div> 正在跨越光年思考中...';
            outputArea.classList.remove('hidden');
            aiResponse.innerHTML = '<span class="text-gray-500 animate-pulse">正在解码信号...</span>';

            // 动态配置大模型 API URL
            const apiUrl = `https://generativelanguage.googleapis.com/v1beta/models/${modelName}:generateContent?key=${finalApiKey}`;
            
            // 构建发送给 AI 的数据包
            const requestBody = {
                contents: [{
                    parts: [{
                        text: "你现在是一个冷静、理智且充满温度的赛博架构师（类似于哈基米），请耐心且真诚地回答用户的以下烦恼或问题：\n\n用户说：" + userInput
                    }]
                }]
            };

            try {
                // 使用带有自动重试机制的 fetch 发送请求
                const response = await fetchWithRetry(apiUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(requestBody)
                });

                const data = await response.json();

                // 解析并展示 AI 的回复
                if (response.ok && data.candidates && data.candidates.length > 0) {
                    const replyText = data.candidates[0].content.parts[0].text;
                    aiResponse.innerHTML = replyText;
                } else {
                    aiResponse.innerHTML = `<span class="text-red-400">系统报错了：${data.error?.message || '未知错误'}</span>`;
                }

            } catch (error) {
                // 如果网络物理断了
                aiResponse.innerHTML = `<span class="text-red-400">物理断线，请检查网络连接：${error.message}</span>`;
            } finally {
                // 恢复按钮状态
                sendBtn.disabled = false;
                sendBtn.innerHTML = '发送给架构师AI';
            }
        }
    </script>
</body>
</html>
